<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <title>Nguyễn Trần Kim Phượng 💖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #000011 0%, #000000 100%);
            font-family: 'Times New Roman', Times, serif;
            user-select: none;
            perspective: 1000px;
            cursor: pointer;
        }

        /* ── ĐIỀU KHIỂN HIỂN THỊ 2 TRANG ── */
        #intro-interface {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #000011 0%, #000000 100%);
        }

        #main-interface {
            display: none; /* Ẩn trang chính lúc đầu */
        }

        #canvas-stars, #canvas-confetti {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        #canvas-stars   { z-index: 1; }
        #canvas-confetti{ z-index: 3; }

        #main {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
            padding: 20px;
            width: 90%;
            max-width: 520px;
        }

        /* ── Pixel cake canvas ── */
        #cake-canvas {
            cursor: pointer;
            image-rendering: pixelated;
            animation: floatCake 3s ease-in-out infinite;
            filter: drop-shadow(0 0 18px #ff748799);
        }
        @keyframes floatCake {
            0%,100% { transform: translateY(0px); }
            50%      { transform: translateY(-12px); }
        }

        .title {
            font-size: 1.8rem;
            color: #ff7487;
            text-shadow: 0 0 20px #ff7487, 0 0 40px #ff748788;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 3px;
            margin-top: 4px;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #ff7487, 0 0 20px #ff748788; }
            to   { text-shadow: 0 0 25px #ff7487, 0 0 50px #ff7487aa, 0 0 80px #ff748755; }
        }

        .name {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #ff7487, 0 0 40px #ffffff88;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #ffb3bf;
            font-style: italic;
            text-shadow: 0 0 8px #ff748788;
        }

        .hearts-row {
            font-size: 1.4rem;
            letter-spacing: 8px;
            animation: heartbeat 1.2s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.18); }
        }

        .countdown-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
        }
        .countdown-label {
            font-size: 0.78rem;
            color: #ff7487aa;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .countdown-num {
            font-size: 3.6rem;
            font-weight: bold;
            color: #ff7487;
            text-shadow: 0 0 30px #ff7487, 0 0 60px #ff748866;
            min-width: 80px;
            line-height: 1;
            transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
        }
        .countdown-num.pop { transform: scale(1.35); }

        #blown-msg {
            display: none;
            font-size: 1.1rem;
            color: #ffd6e0;
            font-style: italic;
            text-shadow: 0 0 10px #ff7487;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        /* ── GIAO DIỆN CHỮ RƠI NGUYÊN BẢN ── */
        #galaxy {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        #rotatingContainer {
            position: fixed;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            pointer-events: none;
            transform-style: preserve-3d;
            transform-origin: center center;
            z-index: 2;
            transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg);
        }

        .text-particle {
            position: absolute;
            white-space: nowrap;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
            will-change: transform, opacity;
            user-select: none;
        }

        .image-particle {
            position: absolute;
            pointer-events: none;
            max-width: 50px; max-height: 50px;
            will-change: transform, opacity;
            user-select: none;
            border-radius: 5px;
            filter: drop-shadow(0 0 4px #fff);
        }

        @media (max-width: 480px) {
            .name { font-size: 1.8rem; }
            .title { font-size: 1.3rem; }
            .countdown-num { font-size: 2.8rem; }
        }
    </style>
</head>

<body>

    <div id="intro-interface">
        <canvas id="canvas-stars"></canvas>
        <canvas id="canvas-confetti"></canvas>

        <div id="main">
            <canvas id="cake-canvas" width="160" height="180"></canvas>
            <div class="title">✨ Happy Birthday ✨</div>
            <div class="name">Kim Phượng</div>
            <div class="subtitle">Ước xong rồi thổi nến nha mom 💖</div>
            <div class="hearts-row">❤️ 💗 ❤️ 💗 ❤️</div>
            <div id="blown-msg">Lúc nào cũng phải thật hạnh phúc nhaaa❤️</div>
            <div class="countdown-wrap">
                <div class="countdown-label">Đếm ngược trong</div>
                <div class="countdown-num" id="num">15</div>
                <div class="countdown-label">giây</div>
            </div>
        </div>
    </div>

    <div id="main-interface">
        <div id="galaxy"></div>
        <div id="rotatingContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
    
    <script>
    /* ══════════════════════════════════════
       QUẢN LÝ QUY TRÌNH PHÁT NHẠC DUY NHẤT
    ══════════════════════════════════════ */
    const audio = new Audio('./main1.mp3');
    audio.loop = true;
    audio.play().catch(()=>{});
    document.body.addEventListener('click', ()=>audio.play().catch(()=>{}), {once:true});


    /* ══════════════════════════════════════
       LOGIC TRANG INTRO (GIỮ NGUYÊN)
    ══════════════════════════════════════ */
    const starCanvas = document.getElementById('canvas-stars');
    const sCtx = starCanvas.getContext('2d');
    const confettiCanvas = document.getElementById('canvas-confetti');
    const cCtx = confettiCanvas.getContext('2d');

    function resizeAll() {
        starCanvas.width = confettiCanvas.width = window.innerWidth;
        starCanvas.height = confettiCanvas.height = window.innerHeight;
    }
    resizeAll();
    window.addEventListener('resize', resizeAll);

    const starsArr = Array.from({length:250}, () => ({
        x: Math.random()*window.innerWidth,
        y: Math.random()*window.innerHeight,
        r: Math.random()*1.6+0.3,
        a: Math.random(),
        da: (Math.random()-0.5)*0.012
    }));
    function drawStars() {
        sCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
        starsArr.forEach(s => {
            s.a += s.da;
            if (s.a<0.1||s.a>1) s.da*=-1;
            sCtx.beginPath();
            sCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
            sCtx.fillStyle=`rgba(255,255,255,${s.a.toFixed(2)})`;
            sCtx.fill();
        });
        requestAnimationFrame(drawStars);
    }
    drawStars();

    const confColors=['#ff7487','#ffb3bf','#ff4d6d','#fff','#ffd6e0','#ff9eb5','#c77dff','#ffccd5','#ffa0b4'];
    const pieces=Array.from({length:100},()=>({
        x:Math.random()*window.innerWidth,
        y:Math.random()*window.innerHeight-window.innerHeight,
        r:Math.random()*6+3,
        color:confColors[Math.floor(Math.random()*confColors.length)],
        speed:Math.random()*2.5+0.8,
        spin:Math.random()*0.2-0.1,
        angle:Math.random()*Math.PI*2,
        shape:Math.random()<0.5?'rect':'circle',
        w:Math.random()*12+5, h:Math.random()*6+3,
        drift:(Math.random()-0.5)*0.5
    }));
    function drawConfetti(){
        cCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
        pieces.forEach(p=>{
            p.y+=p.speed; p.x+=p.drift; p.angle+=p.spin;
            if(p.y>confettiCanvas.height+20){p.y=-20;p.x=Math.random()*confettiCanvas.width;}
            cCtx.save();
            cCtx.translate(p.x,p.y); cCtx.rotate(p.angle);
            cCtx.fillStyle=p.color; cCtx.globalAlpha=0.88;
            if(p.shape==='rect'){ cCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
            else { cCtx.beginPath(); cCtx.arc(0,0,p.r,0,Math.PI*2); cCtx.fill(); }
            cCtx.restore();
        });
        requestAnimationFrame(drawConfetti);
    }
    drawConfetti();

    /* BÁNH KEM PIXEL */
    const cakeCanvas = document.getElementById('cake-canvas');
    const kCtx = cakeCanvas.getContext('2d');
    cakeCanvas.width  = 160; cakeCanvas.height = 180;
    cakeCanvas.style.width = '160px'; cakeCanvas.style.height = '180px';

    const C = {
        none: null, cream: '#FFF5E1', cream2: '#FFE4B5', pink: '#FF7487',
        pink2: '#FF4D6D', pink3: '#FFB3BF', red: '#CC2244', white: '#FFFFFF',
        brown: '#8B4513', brown2: '#A0522D', yellow: '#FFD700', orange: '#FF8C00',
        orange2: '#FFA500', dark: '#3B1A08', candle: '#F5DEB3', candle2: '#DEB887',
        fOuter: '#FF6B00', fMid: '#FFD700', fCore: '#FFFFFF', berry: '#CC0044',
        leaf: '#228B22', icing: '#FFD6E0',
    };

    const S = 4;
    function px(col, gx, gy) { if (col) { kCtx.fillStyle = col; kCtx.fillRect(gx*S, gy*S, S, S); } }

    let candleOn = true; let flameAnim = 0;

    function drawCake() {
        kCtx.clearRect(0, 0, 160, 180);
        for (let x=14;x<=26;x++) px(C.cream, x, 12);
        [14,16,19,22,25,26].forEach(x => px(C.cream, x, 13));
        for (let y=13;y<=22;y++) {
            for (let x=14;x<=26;x++) {
                if (y===13 && ![14,16,19,22,25,26].includes(x)) px(C.pink3, x, y);
                else if (y>13) px(C.pink3, x, y);
            }
        }
        for (let x=14;x<=26;x++) { px(C.pink, x, 16); px(C.pink, x, 20); }
        for (let y=13;y<=22;y++) { px(C.pink2, 14, y); px(C.pink2, 26, y); }
        px(C.pink2, 14,22); px(C.pink2, 26,22);
        for (let x=14;x<=26;x++) px(C.pink2, x, 22);

        for (let x=10;x<=29;x++) px(C.cream, x, 23);
        [10,12,15,18,21,24,27,29].forEach(x => px(C.cream, x, 24));
        for (let y=24;y<=34;y++) {
            for (let x=10;x<=29;x++) {
                if (y===24 && ![10,12,15,18,21,24,27,29].includes(x)) px(C.pink2, x, y);
                else if (y>24) px(C.pink2, x, y);
            }
        }
        for (let x=10;x<=29;x++) { px(C.pink, x, 27); px(C.pink, x, 31); }
        [[13,29],[17,29],[21,29],[25,29],[13,25],[17,25],[21,25],[25,25]].forEach(([x,y]) => px(C.white, x, y));
        for (let y=23;y<=34;y++) { px(C.red, 10, y); px(C.red, 29, y); }
        for (let x=10;x<=29;x++) px(C.red, x, 34);

        for (let x=8;x<=31;x++) px(C.cream2, x, 35);
        for (let x=7;x<=32;x++) px(C.cream, x, 36);
        for (let x=7;x<=32;x++) px(C.cream2, x, 37);

        for (let y=3;y<=11;y++) { px(C.candle, 19, y); px(C.candle2, 20, y); px(C.candle, 21, y); }
        px(C.candle2, 19, 3); px(C.candle2, 20, 3); px(C.candle2, 21, 3);
        px(C.brown2, 19, 11); px(C.brown2, 20, 11); px(C.brown2, 21, 11);

        if (candleOn) {
            const wave = Math.sin(flameAnim) * 0.5;
            const ox = wave > 0.3 ? 1 : (wave < -0.3 ? -1 : 0);
            kCtx.fillStyle = C.fOuter;
            [[20+ox,2],[19+ox,1],[20+ox,1],[21+ox,1],[19,0],[20,0],[21,0],[20+ox,-1]].forEach(([x,y]) => {
                if(x>=0&&y+2>=0) px(C.fOuter, x, y+2);
            });
            [[20+ox,2],[20,1],[20,0]].forEach(([x,y]) => px(C.fMid, x, y+1));
            px(C.fCore, 20, 2);
        }
        px(C.berry, 17, 13); px(C.berry, 23, 13);
        px(C.leaf,  16, 12); px(C.leaf,  24, 12);
        flameAnim += 0.15;
    }

    function cakeLoop() { drawCake(); requestAnimationFrame(cakeLoop); }
    cakeLoop();

    cakeCanvas.addEventListener('click', () => {
        if (!candleOn) return;
        candleOn = false;
        document.getElementById('blown-msg').style.display = 'block';
        spawnSmoke();
    });

    function spawnSmoke() {
        const rect = cakeCanvas.getBoundingClientRect();
        for (let i=0;i<8;i++) {
            const d = document.createElement('div');
            d.style.cssText = `
                position:fixed; left:${rect.left + rect.width/2 + (Math.random()-0.5)*20}px; top:${rect.top + 10}px;
                width:6px; height:6px; border-radius:50%; background:rgba(200,200,200,0.7);
                pointer-events:none; z-index:10; animation: smokeUp 1.2s ease-out forwards;
            `;
            document.body.appendChild(d);
            setTimeout(()=>d.remove(), 1300);
        }
    }
    const smokeStyle = document.createElement('style');
    smokeStyle.textContent = `@keyframes smokeUp { 0% { transform: translateY(0) scale(1); opacity: 0.7; } 100% { transform: translateY(-60px) scale(3); opacity: 0; } }`;
    document.head.appendChild(smokeStyle);


    /* ══════════════════════════════════════
       LOGIC TRANG CHỮ RƠI CHÍNH (GIỮ NGUYÊN CỦA BẠN)
    ══════════════════════════════════════ */
    const rotatingContainer = document.getElementById('rotatingContainer');
    const galaxy = document.getElementById('galaxy');

    const messages = [
        "háp Piii bớt đây",
        "chúc Pii tất cả 💖",
        "mà trừ vất vả ra",
        "23 tuổi ròi haaaa", 
        "+1 tuỉ nữa ròi ", 
        "chinh iu ớiiii",
        "cười nhìu lơn", 
        "ôn quây háp bi nịt",
        "đãaaaaa",
        "moahhhh"
    ];
    const textColor = "#ff7487";
    const imageURL = " ";
    const icons = ["❤️", "❤", "💗"];

    const maxParticles = 150;
    const activeParticles = new Set();

    function createTextParticle() {
        if (activeParticles.size >= maxParticles) return;
        const el = document.createElement('div');
        const isIcon = Math.random() < 0.3;
        el.className = 'text-particle';
        el.textContent = isIcon
            ? icons[Math.floor(Math.random() * icons.length)]
            : messages[Math.floor(Math.random() * messages.length)];
        el.style.fontSize = (isIcon ? 20 : 18) + Math.random() * 10 + 'px';
        el.style.color = textColor;
        el.style.opacity = 0;

        rotatingContainer.appendChild(el);

        const w = el.offsetWidth || 50;
        el.style.left = Math.random() * (window.innerWidth - w) + 'px';
        const translateZ = -Math.random() * 300;
        const startY = -30, endY = window.innerHeight + 30;
        const duration = 8000 + Math.random() * 4000;
        const t0 = performance.now();

        function anim(t) {
            const dt = t - t0;
            if (dt < duration) {
                const p = dt / duration;
                el.style.transform = `translateY(${startY + p * (endY - startY)}px) translateZ(${translateZ}px)`;
                el.style.opacity = p < 0.1 ? p * 10 : (p > 0.9 ? (1 - p) * 10 : 1);
                requestAnimationFrame(anim);
            } else {
                el.remove();
                activeParticles.delete(el);
            }
        }

        activeParticles.add(el);
        requestAnimationFrame(anim);
    }

    function createImageParticle() {
        if (activeParticles.size >= maxParticles) return;
        if (!imageURL || imageURL.trim() === "") return; // Chặn nếu link rỗng

        const el = document.createElement('img');
        el.src = imageURL;
        el.className = 'image-particle';
        el.style.opacity = 0;

        rotatingContainer.appendChild(el);

        const w = el.offsetWidth || 40;
        el.style.left = Math.random() * (window.innerWidth - w) + 'px';

        const translateZ = -Math.random() * 300;
        const startY = -50, endY = window.innerHeight + 50;
        const duration = 8000 + Math.random() * 4000;
        const t0 = performance.now();

        function anim(t) {
            const dt = t - t0;
            if (dt < duration) {
                const p = dt / duration;
                el.style.transform = `translateY(${startY + p * (endY - startY)}px) translateZ(${translateZ}px)`;
                el.style.opacity = p < 0.1 ? p * 10 : (p > 0.9 ? (1 - p) * 10 : 1);
                requestAnimationFrame(anim);
            } else {
                el.remove();
                activeParticles.delete(el);
            }
        }

        activeParticles.add(el);
        requestAnimationFrame(anim);
    }

    /* KHỞI TẠO THREEJS KHÔNG GIAN GỐC */
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 150;
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    galaxy.appendChild(renderer.domElement);

    const starsCount = 500;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 400;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 400;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 400;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const textureLoader = new THREE.TextureLoader();
    const starTexture = textureLoader.load('https://threejs.org/examples/textures/sprites/disc.png');

    const material = new THREE.PointsMaterial({
        color: 0xffffff, size: 0.5, map: starTexture,
        transparent: true, alphaTest: 0.2, depthWrite: false
    });

    const stars = new THREE.Points(geometry, material);
    scene.add(stars);

    function animateStars() {
        requestAnimationFrame(animateStars);
        renderer.render(scene, camera);
    }
    animateStars();

    /* ĐỊNH HƯỚNG THEO CHUỘT */
    document.addEventListener('mousemove', (e) => {
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        const rotY = ((e.clientX - cx) / cx) * 10;
        const rotX = (-(e.clientY - cy) / cy) * 10;
        rotatingContainer.style.transform =
            `translate(-50%, -50%) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });


    /* ══════════════════════════════════════
       BỘ ĐẾM NGƯỢC 10 GIÂY VÀ CHUYỂN TRANG
    ══════════════════════════════════════ */
    let count = 15;
    const numEl = document.getElementById('num');

    const timer = setInterval(() => {
        count--;
        numEl.classList.add('pop');
        setTimeout(() => numEl.classList.remove('pop'), 200);
        
        if (count <= 0) {
            clearInterval(timer);
            numEl.textContent = '🎉';
            
            setTimeout(() => {
                // Ẩn giao diện intro và kích hoạt khối trang rơi chính
                document.getElementById('intro-interface').style.display = 'none';
                document.getElementById('main-interface').style.display = 'block';
                
                // GIỮ NGUYÊN VÒNG LẶP GENERATE GỐC CỦA BẠN (Mỗi 300ms sinh ra 4 khối rơi đồng thời)
                setInterval(() => {
                    for (let i = 0; i < 4; i++) {
                        createTextParticle();
                        if (Math.random() < 0.5) createImageParticle();
                    }
                }, 300);

            }, 600);
        } else {
            numEl.textContent = count;
        }
    }, 1000);
    </script>
</body>

</html>
